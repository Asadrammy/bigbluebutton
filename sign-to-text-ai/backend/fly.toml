# Fly.io Configuration
# For Sign Language Translation API

app = "sign-language-api"
primary_region = "fra"  # Frankfurt - adjust based on your location

# Build configuration
[build]
  dockerfile = "Dockerfile.prod"

# Environment variables (set secrets with: fly secrets set KEY=VALUE)
[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  API_V1_PREFIX = "/api"
  WHISPER_MODEL_SIZE = "base"
  MAX_UPLOAD_SIZE = "104857600"
  ACCESS_TOKEN_EXPIRE_MINUTES = "30"
  REFRESH_TOKEN_EXPIRE_DAYS = "7"

# HTTP service
[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Health checks
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # HTTP checks
  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"

# Resource allocation
[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048

# Volumes for persistent storage
[mounts]
  source = "sign_lang_data"
  destination = "/app/uploads"

# Secrets to set (use: fly secrets set KEY=VALUE)
# SECRET_KEY
# DATABASE_URL (from Fly Postgres)
# REDIS_URL (from Upstash or Fly Redis)
# ALLOWED_ORIGINS
# POSTGRES_PASSWORD

# Deploy command:
# fly deploy --ha=false
# For high availability: fly deploy --ha=true

